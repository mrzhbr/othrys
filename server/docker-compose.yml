services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: othrys
      POSTGRES_USER: othrys
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-othrys}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U othrys -d othrys"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://othrys:${POSTGRES_PASSWORD:-othrys}@postgres:5432/othrys?sslmode=disable
      PORT: ${PORT:-8080}
      API_SECRET: ${API_SECRET}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-6}
    ports:
      - "${PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
