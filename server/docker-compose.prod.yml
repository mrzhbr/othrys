# Production deployment with automatic HTTPS via Caddy
#
# Usage:
#   cp .env.example .env   # fill in real values
#   echo "DOMAIN=othrys.yourdomain.com" >> .env
#   docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: othrys
      POSTGRES_USER: othrys
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U othrys -d othrys"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # No ports exposed — only accessible within Docker network

  server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://othrys:${POSTGRES_PASSWORD}@postgres:5432/othrys?sslmode=disable
      PORT: 8080
      API_SECRET: ${API_SECRET}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-6}
    # No ports exposed to host — Caddy proxies to this
    expose:
      - "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      server:
        condition: service_healthy

volumes:
  pgdata:
  caddy_data:
  caddy_config:
